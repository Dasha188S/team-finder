name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8 (PEP 8, max line length = 100)
        run: |
          flake8 . --count --max-line-length=100 \
            --exclude=.git,__pycache__,migrations,venv,.venv,staticfiles \
            --show-source --statistics

      - name: Run Django tests (SQLite test backend)
        env:
          DJANGO_SECRET_KEY: ci-test-secret
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          POSTGRES_DB: team_finder
          POSTGRES_USER: team_finder
          POSTGRES_PASSWORD: team_finder
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
        run: |
          python manage.py test --noinput
